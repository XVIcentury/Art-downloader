<button id="startBtn">Scarica tutto (ZIP)</button>

const logEl = document.getElementById('log');
const progEl = document.getElementById('progress');
const btn = document.getElementById('startBtn');

function log(msg, cls) {
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  logEl.appendChild(line);
  logEl.scrollTop = logEl.scrollHeight;
}

function sanitize(name) {
  return name.replace(/[\\/:*?"<>|]/g, '_').trim();
}

// Extract a Commons "File:" title from a URL (direct file link or category page)
function extractFileTitleFromCommonsUrl(url) {
  const m = url.match(/commons\.wikimedia\.org\/wiki\/File:(.+)$/);
  if (m) return decodeURIComponent(m[1]);
  return null;
}
function extractCategoryTitle(url) {
  const m = url.match(/commons\.wikimedia\.org\/wiki\/Category:(.+)$/);
  if (m) return decodeURIComponent(m[1]);
  return null;
}
function extractWikipediaTitle(url) {
  const m = url.match(/(\w+)\.wikipedia\.org\/wiki\/(.+)$/);
  if (m) return { lang: m[1], title: decodeURIComponent(m[2]) };
  return null;
}

async function getImageInfoByFileTitle(fileTitle) {
  const api = `https://commons.wikimedia.org/w/api.php?action=query&titles=${encodeURIComponent('File:'+fileTitle)}&prop=imageinfo&iiprop=url|size|mime&format=json&origin=*`;
  const res = await fetch(api);
  const data = await res.json();
  const pages = data.query.pages;
  const page = Object.values(pages)[0];
  if (!page || page.missing || !page.imageinfo) return null;
  return page.imageinfo[0];
}

async function getFirstFileInCategory(categoryTitle) {
  const api = `https://commons.wikimedia.org/w/api.php?action=query&list=categorymembers&cmtitle=${encodeURIComponent('Category:'+categoryTitle)}&cmtype=file&cmlimit=1&format=json&origin=*`;
  const res = await fetch(api);
  const data = await res.json();
  const members = data.query.categorymembers;
  if (!members || !members.length) return null;
  return members[0].title.replace(/^File:/, '');
}

async function getPageImageFromWikipedia(lang, title) {
  // Metodo 1: pageimages (immagine principale/infobox)
  const api1 = `https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=pageimages&piprop=original&format=json&origin=*`;
  const res1 = await fetch(api1);
  const data1 = await res1.json();
  const page1 = Object.values(data1.query.pages)[0];
  if (page1 && page1.original && page1.original.source) {
    return decodeURIComponent(page1.original.source.split('/').pop());
  }
  // Metodo 2 (fallback): prima immagine elencata nella pagina, escludendo icone/loghi generici
  const api2 = `https://${lang}.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(title)}&prop=images&imlimit=20&format=json&origin=*`;
  const res2 = await fetch(api2);
  const data2 = await res2.json();
  const page2 = Object.values(data2.query.pages)[0];
  if (page2 && page2.images) {
    const skip = /(icon|logo|commons-logo|wikidata|edit-icon|question_book|padlock|ambox|folder|wiki_letter)/i;
    const candidate = page2.images.find(im => !skip.test(im.title));
    if (candidate) return candidate.title.replace(/^File:/, '');
  }
  return null;
}

async function getImageInfoAnySite(fileTitle) {
  // Prova prima su Commons, poi come file locale della wiki di origine
  let info = await getImageInfoByFileTitle(fileTitle);
  if (info) return info;
  return null;
}

async function resolveImageInfo(url) {
  let fileTitle = extractFileTitleFromCommonsUrl(url);
  if (fileTitle) {
    const info = await getImageInfoByFileTitle(fileTitle);
    if (info) return info;
  }
  const catTitle = extractCategoryTitle(url);
  if (catTitle) {
    const ft = await getFirstFileInCategory(catTitle);
    if (ft) {
      const info = await getImageInfoByFileTitle(ft);
      if (info) return info;
    }
  }
  const wiki = extractWikipediaTitle(url);
  if (wiki) {
    const fname = await getPageImageFromWikipedia(wiki.lang, wiki.title);
    if (fname) {
      const info = await getImageInfoByFileTitle(fname);
      if (info) return info;
    }
  }
  return null;
}

async function fetchAsBlob(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  return await res.blob();
}

let failedList = [];
let failedData = [];

async function runDownload(items) {
  btn.disabled = true;
  const zip = new JSZip();
  let done = 0, failed = 0;
  failedList = [];
  failedData = [];

  for (const [date, author, title, url] of items) {
    const label = `${date} - ${author} - ${title}`;
    progEl.textContent = `Elaboro ${done + failed + 1}/${items.length}: ${label}`;
    try {
      const info = await resolveImageInfo(url);
      if (!info || !info.url) {
        throw new Error('immagine non risolta da API');
      }
      const ext = info.url.split('.').pop().split('?')[0].toLowerCase();
      const blob = await fetchAsBlob(info.url);
      const filename = sanitize(`${label}.${ext}`);
      zip.file(filename, blob);
      log(`OK  ${label} (${(blob.size/1024).toFixed(0)} KB) <- ${info.url}`, 'ok');
      done++;
    } catch (e) {
      log(`FAIL ${label} :: ${e.message} :: ${url}`, 'err');
      failed++;
      failedList.push(`${label} :: ${url}`);
      failedData.push([date, author, title, url]);
    }
  }

  progEl.textContent = `Completato: ${done} scaricate, ${failed} fallite su ${items.length}.`;

  if (done > 0) {
    log('Genero ZIP...', 'pending');
    const content = await zip.generateAsync({type:'blob'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(content);
    a.download = 'opere_arte.zip';
    document.body.appendChild(a);
    a.click();
    log('ZIP pronto: tocca il link se il download non parte automaticamente.', 'ok');
    const manualLink = document.createElement('a');
    manualLink.href = a.href;
    manualLink.download = 'opere_arte.zip';
    manualLink.textContent = 'Tocca qui per scaricare opere_arte.zip';
    manualLink.style.display = 'block';
    manualLink.style.color = '#4ade80';
    manualLink.style.margin = '12px 0';
    logEl.appendChild(manualLink);
  }

  btn.disabled = false;
  if (failedData.length > 0) {
    btn.textContent = `Riprova solo i ${failedData.length} falliti`;
  } else {
    btn.textContent = 'Tutto scaricato';
  }
}

btn.addEventListener('click', () => {
  const items = failedData.length > 0 ? failedData : DATA;
  runDownload(items);
});

document.getElementById('copyFailBtn').addEventListener('click', async () => {
  if (failedList.length === 0) {
    log('Nessun elemento fallito da copiare (o download non ancora eseguito).', 'pending');
    return;
  }
  const text = failedList.join('\n');
  try {
    await navigator.clipboard.writeText(text);
    log(`Copiati ${failedList.length} elementi falliti negli appunti.`, 'ok');
  } catch (e) {
    log('Copia automatica non riuscita, testo mostrato sotto (selezionalo manualmente):', 'err');
    const pre = document.createElement('pre');
    pre.style.cssText = 'white-space:pre-wrap;background:#222;padding:8px;border-radius:6px;user-select:all;';
    pre.textContent = text;
    logEl.appendChild(pre);
  }
});
</script>
